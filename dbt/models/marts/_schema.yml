version: 2

models:
  - name: dim_region
    description: Region dimension enriched with market and population attributes.
    columns:
      - name: region_key
        tests: [unique, not_null]
      - name: region_code
        tests: [unique, not_null]

  - name: dim_fuel_type
    description: Fuel dimension with renewable flag and CO2 emission factor (kg/MWh).
    columns:
      - name: fuel_key
        tests: [unique, not_null]
      - name: fuel_code
        tests: [unique, not_null]

  - name: fct_grid_hourly
    description: >
      Hourly demand fact with forecast comparison.
      Grain: one row per (region_key, period_utc). Incremental with a 3-day
      reprocessing lookback to absorb EIA revisions.
    tests:
      - unique_combination:
          columns: ['region_key', 'period_utc']
    columns:
      - name: region_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_region')
              field: region_key
      - name: demand_mwh
        tests: [not_null]

  - name: fct_generation_hourly
    description: >
      Hourly generation fact with emission estimates.
      Grain: one row per (region_key, fuel_key, period_utc).
    tests:
      - unique_combination:
          columns: ['region_key', 'fuel_key', 'period_utc']
    columns:
      - name: fuel_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_fuel_type')
              field: fuel_key

  - name: agg_daily_region_summary
    description: >
      Daily per-region rollup powering the executive report: demand, renewable
      share, estimated emissions, forecast MAPE, and anomaly flags.
    columns:
      - name: summary_date
        tests: [not_null]
      - name: renewable_share
        description: Fraction of generation from renewable fuels (0-1); null when generation is missing.
